mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  user: frigate
  password: frigate123
  topic_prefix: frigate
  client_id: frigate

database:
  path: /media/frigate/frigate.db

detectors:
  cpu1:
    type: cpu
    num_threads: 2

cameras:
  fake_cam:
    ffmpeg:
      inputs:
        - path: http://fake-camera:8080/stream
          input_args: -fflags +genpts -avoid_negative_ts make_zero
          roles:
            - detect
            - record

    detect:
      enabled: true
      width: 640
      height: 480
      fps: 2

    objects:
      track:
        - person
      filters:
        person:
          min_area: 1000
          max_area: 100000
          min_score: 0.5
          threshold: 0.6

    motion:
      threshold: 25
      contour_area: 100

    record:
      enabled: true

    snapshots:
      enabled: true
      timestamp: true
      bounding_box: true

    mqtt:
      enabled: true
      timestamp: true
      bounding_box: true
      crop: true
      height: 270

logger:
  default: info
  logs:
    frigate.mqtt: debug